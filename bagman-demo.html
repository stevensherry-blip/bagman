/* ============ HELPERS ============ */
function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
function fmtMoney(n) {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + Math.round(n / 1e3).toLocaleString() + 'K';
  return '$' + Math.round(n).toLocaleString();
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function fmtDate(d) { if (!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function isOverdue(t) { return t.nextFollowUp && daysBetween(todayISO(), t.nextFollowUp) < 0; }
function isDueSoon(t) { if (!t.nextFollowUp) return false; const d = daysBetween(todayISO(), t.nextFollowUp); return d >= 0 && d <= 3; }
function genId() { return 't_' + Math.random().toString(36).slice(2, 10); }

function classify(name) {
  const up = (name || '').toUpperCase();
  if (COMPETITOR_KEYS.some(k => up.includes(k))) return 'competitor';
  if (ADMIN_KEYS.some(k => up.includes(k))) return 'admin';
  if (AGENCY_KEYS.some(k => up.includes(k))) return 'agency';
  return 'other';
}

/* ============ FEC API ============ */
async function fecFetch(path, params) {
  const q = new URLSearchParams({ api_key: S.apiKey, ...params });
  let res;
  try {
    res = await fetch(`${FEC_BASE}${path}?${q}`);
  } catch (e) {
    throw new Error('Could not reach the FEC. If you are viewing this inside the Claude chat preview, outside connections are blocked there. Download this file and open it directly in your browser (double-click the .html) and it will connect.');
  }
  if (res.status === 429) throw new Error('Rate limit hit. DEMO_KEY allows very few calls per hour. Grab a free key at api.data.gov/signup and paste it above.');
  if (!res.ok) throw new Error(`FEC API error ${res.status}`);
  return res.json();
}

async function findCandidates() {
  if (S.state === 'CA' && S.office === 'S') {
    S.candidates = [];
    S.candStatus = 'California has no US Senate race in 2026. The governor race + all 14 ballot measures file with the STATE (CAL-ACCESS), not the FEC. Switch Race to House to scan CA congressional campaigns, or ask Claude in chat to research CA state committees. The board already has CA ballot committees and agencies pre-loaded.';
    render();
    return;
  }
  const stateName = (STATES.find(s=>s.code===S.state)||{name:S.state}).name;
  S.candStatus = 'Searching FEC for 2026 ' + (S.office === 'S' ? 'Senate' : 'House') + ' candidates in ' + stateName + '…';
  S.candidates = [];
  render();

  try {
    let results = [];

    if (S.office === 'S') {
      // Senate: /elections/ returns total_receipts, total_disbursements, cash_on_hand_end_period
      const data = await fecFetch('/elections/', {
        state: S.state, cycle: 2026, office: 'senate', per_page: 20,
      });
      results = (data.results || []).map(c => ({
        name: c.candidate_name || '',
        party: c.party_full || '',
        receipts: c.total_receipts || 0,
        disbursements: c.total_disbursements || 0,
        cashOnHand: c.cash_on_hand_end_period || 0,
        district: '',
        committees: c.candidate_pcc_id ? [{ id: c.candidate_pcc_id, name: c.candidate_pcc_name || c.candidate_name || '' }] : [],
      })).filter(c => c.committees.length && c.name);

    } else {
      // House: fetch candidates, then committee + totals in parallel per candidate
      const data = await fecFetch('/candidates/', {
        state: S.state, office: 'H', cycle: 2026,
        has_raised_funds: true, per_page: 100,
      });
      const cands = (data.results || []).filter(c => c.name && c.candidate_id);

      const filtered = S.party === 'dem-ind'
        ? cands.filter(c => { const p = (c.party_full || c.party || '').toUpperCase(); return p.includes('DEM') || p.includes('IND'); })
        : cands;

      S.candStatus = `Found ${filtered.length} candidates, fetching financials…`;
      render();

      results = await Promise.all(filtered.slice(0, 30).map(async c => {
        try {
          // Fetch committee and totals in parallel
          const [cd, td] = await Promise.all([
            fecFetch(`/candidate/${c.candidate_id}/committees/`, { designation: 'P', per_page: 1 }),
            fecFetch(`/candidate/${c.candidate_id}/totals/`, { cycle: 2026, per_page: 1 }),
          ]);
          const comm = (cd.results || [])[0];
          const totals = (td.results || [])[0] || {};
          return {
            name: c.name,
            party: c.party_full || c.party || '',
            receipts: totals.receipts || 0,
            disbursements: totals.disbursements || 0,
            cashOnHand: totals.last_cash_on_hand_end_period || 0,
            district: c.district_number ? (STATES.find(s=>s.code===S.state)||{code:S.state}).code + '-' + String(c.district_number).padStart(2,'0') : '',
            committees: comm ? [{ id: comm.committee_id, name: comm.name }] : [],
          };
        } catch(e) { return null; }
      }));
      results = results.filter(c => c && c.committees.length);
      // Sort by cash on hand descending so biggest spenders are first
      results.sort((a, b) => b.cashOnHand - a.cashOnHand);
    }

    // Party filter for Senate (House already filtered above)
    if (S.office === 'S' && S.party === 'dem-ind') {
      results = results.filter(c => {
        const p = (c.party || '').toUpperCase();
        return p.includes('DEM') || p.includes('IND');
      });
    }

    S.candidates = results;
    S.candStatus = S.candidates.length ? '' : 'No matching candidates found. Try setting Party lens to All, or switch race type.';
  } catch(e) {
    S.candStatus = 'ERR::' + e.message;
  }
  render();
}

async function scanCommittee(committeeId, committeeName) {
  S.scan = { committeeId, committeeName, rows: [], fetched: 0, status: 'Pulling top disbursements…' };
  render();
  try {
    const agg = {};
    let lastIndexes = null;
    for (let page = 0; page < 3; page++) {
      const params = {
        committee_id: committeeId,
        two_year_transaction_period: 2026,
        sort: '-disbursement_amount',
        per_page: 100,
      };
      if (lastIndexes) Object.assign(params, lastIndexes);
      const data = await fecFetch('/schedules/schedule_b/', params);
      const results = data.results || [];
      results.forEach(r => {
        const name = (r.recipient_name || 'UNKNOWN').trim();
        const key = name.toUpperCase();
        if (!agg[key]) agg[key] = { name, total: 0, count: 0, purpose: r.disbursement_description || '' };
        agg[key].total += r.disbursement_amount || 0;
        agg[key].count += 1;
        if (!agg[key].purpose && r.disbursement_description) agg[key].purpose = r.disbursement_description;
      });
      S.scan.fetched += results.length;
      S.scan.status = `Pulled ${S.scan.fetched} disbursement records…`;
      render();
      const li = data.pagination && data.pagination.last_indexes;
      if (!li || !results.length || results.length < 100) break;
      lastIndexes = { last_index: li.last_index, last_disbursement_amount: li.last_disbursement_amount };
    }
    S.scan.rows = Object.values(agg)
      .map(r => ({ ...r, cls: classify(r.name) }))
      .sort((a, b) => b.total - a.total);
    const comps = S.scan.rows.filter(r => r.cls === 'competitor');
    S.scan.status = S.scan.rows.length
      ? (comps.length
        ? `Done. ${S.scan.rows.length} payees. ⚠ ${comps.length} look like texting/SMS vendors — displacement targets.`
        : `Done. ${S.scan.rows.length} payees. No texting vendor found in top spending — possible whitespace.`)
      : 'No disbursements found for 2026 period yet.';
  } catch (e) {
    S.scan.status = 'ERR::' + e.message;
  }
  render();
}

/* ============ CSV EXPORT ============ */
function exportScanCSV() {
  if (!S.scan || !S.scan.rows.length) return;
  const stateName = (STATES.find(s => s.code === S.state) || {}).name || S.state;
  const header = 'Company name,Category,Total paid,Payments,State,Source committee,Sample purpose\n';
  const rows = S.scan.rows.map(r =>
    [r.name, r.cls, r.total.toFixed(2), r.count, stateName, S.scan.committeeName, r.purpose]
      .map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')
  ).join('\n');
  downloadCSV(header + rows, 'prospects-' + S.scan.committeeId + '.csv');
}
function exportBoardCSV() {
  if (!S.targets.length) return;
  const header = 'Company name,State,Type,Wallet Cards fit,Contact name,Contact title,Contact email,Contact phone,Touches,Last touch,Next follow-up,Notes\n';
  const rows = S.targets.map(t =>
    [t.name, t.state, t.type, t.walletCards ? 'Yes' : 'No', t.contactName || '', t.contactTitle || '', t.contactEmail || '', t.contactPhone || '', t.touches, t.lastTouch || '', t.nextFollowUp || '', t.notes || '']
      .map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')
  ).join('\n');
  downloadCSV(header + rows, 'field-board-hubspot.csv');
}
function downloadCSV(content, filename) {
  const blob = new Blob([content], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ============ BOARD ACTIONS ============ */
function addFromScan(row) {
  const stateName = (STATES.find(s => s.code === S.state) || {}).name || S.state;
  const boardState = BOARD_STATES.includes(stateName) ? stateName : BOARD_STATES[0];
  const type = row.cls === 'agency' ? 'agency' : 'campaign';
  S.targets.push({
    id: genId(), name: row.name, state: boardState, type,
    walletCards: false, touches: 0, lastTouch: null, nextFollowUp: null,
    notes: 'Found via FEC scan of ' + S.scan.committeeName + '. Paid ' + fmtMoney(row.total) + ' across ' + row.count + ' payment(s).' + (row.cls === 'competitor' ? ' PAYS A TEXTING COMPETITOR — displacement play.' : ''),
  });
  saveTargets();
  render();
}
function logTouch(id) {
  const t = S.targets.find(x => x.id === id);
  if (!t) return;
  t.touches += 1; t.lastTouch = todayISO();
  const next = new Date(); next.setDate(next.getDate() + FOLLOWUP_DAYS);
  t.nextFollowUp = next.toISOString().slice(0, 10);
  saveTargets(); render();
}

      </div>
      <div class="field"><label>Next follow-up</label><input id="m-followup" type="date" value="${t.nextFollowUp || ''}"></div>
      <div class="row">
        <div class="field"><label>Contact name</label><input id="m-cname" type="text" value="${esc(t.contactName || '')}" placeholder="From Seamless / LinkedIn"></div>
        <div class="field"><label>Title</label><input id="m-ctitle" type="text" value="${esc(t.contactTitle || '')}" placeholder="e.g. Political Director"></div>
      </div>
      <div class="row">
        <div class="field"><label>Email</label><input id="m-cemail" type="text" value="${esc(t.contactEmail || '')}"></div>
        <div class="field"><label>Phone</label><input id="m-cphone" type="text" value="${esc(t.contactPhone || '')}"></div>
      </div>
      <div class="field checkbox-row"><input id="m-wallet" type="checkbox" ${t.walletCards ? 'checked' : ''}><label style="margin:0;">Wallet Cards fit (membership-based)</label></div>
      <div class="field"><label>Notes</label><textarea id="m-notes">${esc(t.notes)}</textarea></div>
      <div class="modal-actions">
        ${isEdit ? '<button class="btn ghost" id="m-delete">Delete</button>' : ''}
        <button class="btn ghost" id="m-cancel">Cancel</button>
        <button class="btn" id="m-save">${isEdit ? 'Save' : 'Add target'}</button>
      </div>
    </div>`;
  document.body.appendChild(root);
  root.addEventListener('click', e => { if (e.target === root) { S.modal = null; renderModal(); } });
  document.getElementById('m-cancel').addEventListener('click', () => { S.modal = null; renderModal(); });
  if (isEdit) document.getElementById('m-delete').addEventListener('click', () => {
    S.targets = S.targets.filter(x => x.id !== t.id);
    saveTargets(); S.modal = null; render();
  });
  document.getElementById('m-save').addEventListener('click', () => {
    const name = document.getElementById('m-name').value.trim();
    if (!name) return;
    const payload = {
      name,
      state: document.getElementById('m-state').value,
      type: document.getElementById('m-type').value,
      nextFollowUp: document.getElementById('m-followup').value || null,
      walletCards: document.getElementById('m-wallet').checked,
      notes: document.getElementById('m-notes').value.trim(),
      contactName: document.getElementById('m-cname').value.trim(),
      contactTitle: document.getElementById('m-ctitle').value.trim(),
      contactEmail: document.getElementById('m-cemail').value.trim(),
      contactPhone: document.getElementById('m-cphone').value.trim(),
    };
    if (isEdit) Object.assign(t, payload);
    else S.targets.push({ id: genId(), touches: 0, lastTouch: null, ...payload });
    saveTargets(); S.modal = null; render();
  });
}

if (!S.agencyState) S.agencyState = 'all';
if (!S.agencySize) S.agencySize = 'all';
if (!S.agencySpec) S.agencySpec = 'all';

function renderAgencyPanel() {
  const sizeLabel = { large: 'Large', medium: 'Medium', small: 'Small' };
  const sizeColor = { large: 'var(--green)', medium: 'var(--amber)', small: 'var(--dim)' };
  const specLabel = { digital: 'Digital/SMS', gc: 'General', fundraising: 'Fundraising', media: 'Media/Mail' };

  let filtered = AGENCY_DB;
  if (S.agencyState && S.agencyState !== 'all') filtered = filtered.filter(a => a.state === S.agencyState);
  if (S.agencySize && S.agencySize !== 'all') filtered = filtered.filter(a => a.size === S.agencySize);
  if (S.agencySpec && S.agencySpec !== 'all') filtered = filtered.filter(a => a.spec === S.agencySpec);

  const stateOrder = ['California', 'Texas', 'Ohio', 'Michigan', 'Maine'];
  filtered.sort((a, b) => stateOrder.indexOf(a.state) - stateOrder.indexOf(b.state) || a.size.localeCompare(b.size));

  const rows = filtered.map((a, i) => `
    <div style="padding:11px 4px;border-bottom:1px solid var(--line);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">
        <div>
          <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            ${esc(a.name)}
            <span style="font-family:var(--mono);font-size:10px;background:var(--panel-raised);padding:2px 7px;border-radius:3px;color:${sizeColor[a.size]};">${sizeLabel[a.size]}</span>
            <span style="font-family:var(--mono);font-size:10px;background:var(--panel-raised);padding:2px 7px;border-radius:3px;color:var(--violet);">${specLabel[a.spec]||a.spec}</span>
            <span style="font-family:var(--mono);font-size:10px;color:var(--dim);">${esc(a.state)}</span>
          </div>
          <div style="font-size:12px;color:var(--dim);margin-top:5px;line-height:1.45;max-width:680px;">${esc(a.notes)}</div>
          ${a.contact ? `<div style="font-family:var(--mono);font-size:11px;color:var(--teal);margin-top:4px;">Contact: ${esc(a.contact)}</div>` : ''}
          ${a.url ? `<div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px;">${esc(a.url)}</div>` : ''}
        </div>
        <button class="btn ghost small" data-addagency="${i}" style="flex-shrink:0;">+ Board</button>
      </div>
    </div>
  `).join('');

  return `
    <div class="ledger-head" style="margin-bottom:8px;">
      <div style="font-family:var(--mono);font-size:10px;color:var(--dim);">research-curated · ${esc(AGENCIES_UPDATED)}</div>
      <button class="btn ghost small" id="ag-export">Export CSV</button>
    </div>
    <div class="note" style="margin-bottom:12px;">Medium shops working multiple candidates are the real prize — one relationship, many contracts. States: CA · TX · OH · MI · ME · GA · NC · PA · NY · NJ · FL · VA · WI · AZ · NV<br>Bucket: <span style="color:var(--green);">Large</span> (6+ clients/$500K+ billings) · <span style="color:var(--amber);">Medium</span> (3-5 clients) · <span style="color:var(--dim);">Small</span> (1-2 clients, emerging)</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
      <div class="field" style="min-width:120px;flex:1;margin:0;"><label>State</label>
        <select id="ag-state">
          <option value="all" ${S.agencyState==='all'?'selected':''}>All states</option>
          ${['California','Texas','Michigan','Ohio','Maine','Georgia','North Carolina','Pennsylvania','New York','New Jersey','Florida','Virginia','Wisconsin','Arizona','Nevada'].map(s=>'<option value="'+s+'" '+(S.agencyState===s?'selected':'')+'>'+s+'</option>').join('')}
        </select>
      </div>
      <div class="field" style="min-width:100px;flex:1;margin:0;"><label>Size</label>
        <select id="ag-size">
          <option value="all" ${S.agencySize==='all'?'selected':''}>All</option>
          <option value="large" ${S.agencySize==='large'?'selected':''}>Large</option>
          <option value="medium" ${S.agencySize==='medium'?'selected':''}>Medium</option>
          <option value="small" ${S.agencySize==='small'?'selected':''}>Small</option>
        </select>
      </div>
      <div class="field" style="min-width:120px;flex:1;margin:0;"><label>Specialty</label>
        <select id="ag-spec">
          <option value="all" ${S.agencySpec==='all'?'selected':''}>All</option>
          <option value="digital" ${S.agencySpec==='digital'?'selected':''}>Digital/SMS</option>
          <option value="gc" ${S.agencySpec==='gc'?'selected':''}>General</option>
          <option value="fundraising" ${S.agencySpec==='fundraising'?'selected':''}>Fundraising</option>
          <option value="media" ${S.agencySpec==='media'?'selected':''}>Media/Mail</option>
        </select>
      </div>
    </div>
    <div id="ag-list">${rows || '<div class="empty">No agencies match this filter.</div>'}</div>
  `;
}

function wireAgencyPanel() {
  const panel = document.getElementById('agency-panel');
  if (!panel) return;
  panel.querySelector('#ag-state').addEventListener('change', e => { S.agencyState = e.target.value; refreshAgencyPanel(); });
  panel.querySelector('#ag-size').addEventListener('change', e => { S.agencySize = e.target.value; refreshAgencyPanel(); });
  panel.querySelector('#ag-spec').addEventListener('change', e => { S.agencySpec = e.target.value; refreshAgencyPanel(); });
  const exp = panel.querySelector('#ag-export');
  if (exp) exp.addEventListener('click', exportAgencyCSV);
  panel.querySelectorAll('[data-addagency]').forEach(el => el.addEventListener('click', () => {
    const a = getFilteredAgencies()[Number(el.dataset.addagency)];
    if (!a) return;
    S.targets.push({ id: genId(), name: a.name, state: a.state, type: 'agency', walletCards: false, touches: 0, lastTouch: null, nextFollowUp: null, notes: a.notes + (a.contact ? ' | Contact: ' + a.contact : ''), contactName: a.contact || '', contactEmail: '', contactPhone: '', contactTitle: '' });
    saveTargets();
    el.textContent = 'Added ✓'; el.disabled = true;
  }));
}

function getFilteredAgencies() {
  let filtered = AGENCY_DB;
  if (S.agencyState && S.agencyState !== 'all') filtered = filtered.filter(a => a.state === S.agencyState);
  if (S.agencySize && S.agencySize !== 'all') filtered = filtered.filter(a => a.size === S.agencySize);
  if (S.agencySpec && S.agencySpec !== 'all') filtered = filtered.filter(a => a.spec === S.agencySpec);
  return filtered;
}

function refreshAgencyPanel() {
  const panel = document.getElementById('agency-panel');
  if (!panel) return;
  panel.innerHTML = renderAgencyPanel();
  wireAgencyPanel();
}

function exportAgencyCSV() {
  const filtered = getFilteredAgencies();
  if (!filtered.length) return;
  const header = 'Agency name,State,Size,Specialty,Est clients,Contact,Website,Notes\n';
  const rows = filtered.map(a =>
    [a.name, a.state, a.size, a.spec, a.clients || '', a.contact || '', a.url || '', a.notes]
      .map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')
  ).join('\n');
  downloadCSV(header + rows, 'agency-finder.csv');
}
